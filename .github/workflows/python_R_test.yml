# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Test scripts

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
          sudo apt-get update
          sudo apt-get install -y pandoc g++ libcurl4-openssl-dev libssl-dev libxml2-dev libharfbuzz-dev libfontconfig1-dev libfribidi-dev
    

# ------------------- #
# python-related test #
# ------------------- #

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Update Metadata
      run: |
        python3 scripts/update_metadata.py                         \
        --new_meta examples/update_metadata/new_meta.txt           \
        --master_meta examples/update_metadata/metadata_master.txt \
        --run_id 180625                                            \
        --o TEST.txt ;                                             \
        cat TEST.txt
        
    - name: Create FusViz input table
      run: |
        python3 scripts/create_fusviz_input.py                                             \
        -s examples/prepare_fusviz_tables/variant_summary.tsv                              \
        -m examples/prepare_fusviz_tables/sample1_fusion_and_splice_variant_candidates.tsv \
        -g examples/prepare_fusviz_tables/pcg_hg19.tab                                     \
        -o examples/prepare_fusviz_tables/sample1_fusviz.txt ;


# -------------- #
# R-related test #
# -------------- #

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.4.0'

    - name: Set RENV_PATHS_ROOT
      run: echo "RENV_PATHS_ROOT=${{ runner.temp }}/renv" >> $GITHUB_ENV

    - name: Cache R packages
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/renv
        key: Linux-renv-${{ hashFiles('**/renv.lock') }}
        restore-keys: |
          Linux-renv-

    - name: Install renv and restore dependencies
      run: |
        Rscript -e "install.packages(c('renv'))"
        Rscript -e "renv::restore()"

    - name: Render Rmd file (v1)
      run: |
        Rscript -e "rmarkdown::render('InPreD_README.Rmd')"

    # Here we are creating the RUN_ID variable and passing to the Rmd file as a parameter
    # If not provided the README is generated without a run ID
    - name: Render Rmd file (v2)
      run: |
        RUN_ID='250606_AAAAAAAA_BBBB_CCCCCCCCCC'
        RUN_ID_DATE="${RUN_ID%%_*}"
        Rscript -e "rmarkdown::render(input = 'InPreD_pipeline_OUS-Ahus_README.Rmd', output_file = paste0('InPreD_pipeline_OUS-Ahus_README_','${RUN_ID_DATE}','.html'), params=list(args='${RUN_ID}'))"



