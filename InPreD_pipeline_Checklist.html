<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InPreD pipeline Checklist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Load Roboto Mono from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --accent: #6c63ff;
      --accent-light: #ecebff;
      --text: #333;
      --muted: #888;
    }

    body {
      font-family: 'Roboto Mono', monospace;
      background: linear-gradient(135deg, #e0f7fa, #e1bee7);
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .checklist-container {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 550px;
      transition: all 0.3s ease;
    }

    h1 {
      text-align: center;
      color: var(--accent);
      margin-bottom: 0.3rem;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: var(--accent-light);
      transition: background 0.3s, transform 0.2s;
    }

    .checklist-item:hover {
      background: #dcd8ff;
      transform: scale(1.01);
    }

    input[type="checkbox"] {
      width: 1.3rem;
      height: 1.3rem;
      margin-right: 1rem;
      accent-color: var(--accent);
      transition: all 0.2s ease;
    }

    .checked label {
      text-decoration: line-through;
      color: var(--muted);
    }

    label {
      font-size: 1.1rem;
      cursor: pointer;
      flex: 1;
      transition: color 0.3s;
    }

    @media (max-width: 600px) {
      .checklist-container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="checklist-container">
    <h1>InPreD pipeline Checklist</h1>
    <div class="subtitle">Run ID = </div>
    
    <div class="checklist">
      
      <div class="checklist-item">
        <input type="checkbox" id="item1">
        <label for="item1">Verify disk space availability</label>
      </div>
      
      <div class="checklist-item">
        <input type="checkbox" id="item2">
        <label for="item2">Verify size of sequencing run</label>
      </div>

      <div class="checklist-item">
        <input type="checkbox" id="item3">
        <label for="item3">Connect to hpc server</label>
      </div>


<!--
      <div class="checklist-item">
        <input type="checkbox" id="item1">
        <label for="item1">Verify disk space availability</label>
      </div>
-->      
      
    </div>
  </div>

  <script>
    // Load saved state
    document.querySelectorAll('.checklist-item input[type="checkbox"]').forEach((checkbox) => {
      const id = checkbox.id;
      const saved = localStorage.getItem(id);
      if (saved === "true") {
        checkbox.checked = true;
        checkbox.parentElement.classList.add("checked");
      }

      checkbox.addEventListener('change', () => {
        localStorage.setItem(id, checkbox.checked);
        checkbox.parentElement.classList.toggle("checked", checkbox.checked);
      });
    });
  </script>

</body>
</html>
