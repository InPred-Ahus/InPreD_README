  <!-- Load Roboto Mono from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --accent: #6C63FF;
      --accent-light: #6C63FF40;
      --text: #333;
      --muted: #888;
    }

    body {
      font-family: 'Roboto Mono', monospace;
      background: linear-gradient(135deg, #fff7fb, #9ecae1);
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .checklist-container {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 600px;
      transition: all 0.3s ease;
    }

    h1 {
      text-align: center;
      color: var(--accent);
      margin-bottom: 0.3rem;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: var(--accent-light);
      transition: background 0.3s, transform 0.2s;
    }

    
    .checklist-item.Prepare_Pipeline:hover {
          background-color: #00acc1;
        }
.checklist-item.Setup:hover {
          background-color: #fb8c00;
        }
.checklist-item.File_Manipulation:hover {
          background-color: #8e24aa;
        }
.checklist-item.Launch_Analysis:hover {
          background-color: #43a047;
        }
.checklist-item.Important:hover {
          background-color: #a50f15;
        }
.checklist-item.Send_Email:hover {
          background-color: #ffeda0;
        }
.checklist-item.DEFAULT_CLASS:hover {
          background-color: #E6AB02;
        }

    input[type="checkbox"] {
      width: 1.3rem;
      height: 1.3rem;
      margin-right: 1rem;
      accent-color: var(--accent);
      transition: all 0.2s ease;
    }

    .checked label {
      text-decoration: line-through;
      color: var(--muted);
    }

    label {
      font-size: 1.1rem;
      cursor: pointer;
      flex: 1;
      transition: color 0.3s;
    }

    @media (max-width: 600px) {
      .checklist-container {
        padding: 1.5rem;
      }
    }

.layout {
  display: flex;
  align-items: flex-start;
  gap: 30px;
  font-family: sans-serif;
}


  /* ---------------- */
  /* Customize legend */
  /* ---------------- */
  
  /* Sticky + vertically centered legend */
  .legend {
    position: sticky;
    top: 50%;
    transform: translateY(-50%);
    align-self: flex-start;
    min-width: 250px;
    background: white;
    padding: 1rem;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    font-family: sans-serif;
    height: fit-content;
    z-index: 10;
    margin-right: 80px;
  }



  
  .legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }

  .color-box {
    width: 16px;
    height: 16px;
    display: inline-block;
    margin-right: 8px;
    border-radius: 3px;
  }
  
  .color-box.Prepare_Pipeline {
          background-color: #00acc1;

.color-box.Setup {

       }
.color-box.File_Manipulation {

.color-box.Launch_Analysis {

.color-box.Important {

       }
.color-box.Send_Email {

       }
.color-box.DEFAULT_CLASS {

  /* ------------------- */
  /* Customize checklist */
  /* ------------------- */
  
  .checklist-item {
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;

  .checklist-item.Prepare_Pipeline {

.checklist-item.File_Manipulation {

.checklist-item.Launch_Analysis {

  /* ------------ */

    font-size: 1rem;

    font-family: 'Roboto Mono', monospace;
  }

  </style>
</head>

<script>
  const runID = document.getElementById("runID")?.dataset.run || "defaultRun";

  const makeKey = id => `${runID}_${id}`;

  const checkboxes = document.querySelectorAll('.checklist-item input[type="checkbox"]');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  function updateProgress() {
    const total = checkboxes.length;
    const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
    const percent = total === 0 ? 0 : Math.round((checked / total) * 100);
    progressBar.style.width = `${percent}%`;
    progressText.textContent = `${percent}% completed`;
  }

  // Initialize checklist
  checkboxes.forEach((checkbox) => {
    const id = checkbox.id;
    const saved = localStorage.getItem(makeKey(id));

    if (saved === "true") {
      checkbox.checked = true;
      checkbox.parentElement.classList.add("checked");
    }

    checkbox.addEventListener('change', () => {
      localStorage.setItem(makeKey(id), checkbox.checked);
      checkbox.parentElement.classList.toggle("checked", checkbox.checked);
      updateProgress();
    });
  });

  // Reset button logic
  document.getElementById('resetBtn')?.addEventListener('click', () => {
    checkboxes.forEach((checkbox) => {
      localStorage.removeItem(makeKey(checkbox.id));
      checkbox.checked = false;
      checkbox.parentElement.classList.remove("checked");
    });
    updateProgress();
  });

  // Call once on load to reflect saved state
  updateProgress();
</script>
