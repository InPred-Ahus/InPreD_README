<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InPreD pipeline Checklist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Load Roboto Mono from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --accent: #6c63ff;
      --accent-light: #ecebff;
      --text: #333;
      --muted: #888;
    }

    body {
      font-family: 'Roboto Mono', monospace;
      background: linear-gradient(135deg, #e0f7fa, #e1bee7);
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .checklist-container {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 600px;
      transition: all 0.3s ease;
    }

    h1 {
      text-align: center;
      color: var(--accent);
      margin-bottom: 0.3rem;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: var(--accent-light);
      transition: background 0.3s, transform 0.2s;
    }

    .checklist-item:hover {
      background: #dcd8ff;
      transform: scale(1.01);
    }

    input[type="checkbox"] {
      width: 1.3rem;
      height: 1.3rem;
      margin-right: 1rem;
      accent-color: var(--accent);
      transition: all 0.2s ease;
    }

    .checked label {
      text-decoration: line-through;
      color: var(--muted);
    }

    label {
      font-size: 1.1rem;
      cursor: pointer;
      flex: 1;
      transition: color 0.3s;
    }

    @media (max-width: 600px) {
      .checklist-container {
        padding: 1.5rem;
      }
    }

.layout {
  display: flex;
  align-items: flex-start;
  gap: 30px;
  font-family: sans-serif;
}

.legend {
  min-width: 250px;
  font-family: sans-serif;
  gap: 40px; /* increase this if more spacing is needed */

}

.legend-item {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}

.color-box {
  width: 16px;
  height: 16px;
  display: inline-block;
  margin-right: 8px;
  border-radius: 3px;
}

.color-box.prepare_pipeline {
  background-color: #00acc1;
}
.color-box.setup {
  background-color: #fb8c00;
}
.color-box.move {
  background-color: #8e24aa;
}
.color-box.reference {
  background-color: #43a047;
}
.color-box.important {
  background-color: #e53935;
}

  .checklist-item {
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
  }

  .checklist-item.prepare_pipeline {
    background-color: #e0f7fa; /* light cyan */
    border-left: 4px solid #00acc1;
  }
  
  .checklist-item.setup {
    background-color: #fff3e0; /* light orange */
    border-left: 4px solid #fb8c00;
  }
  
  .checklist-item.move {
    background-color: #f3e5f5; /* light purple */
    border-left: 4px solid #8e24aa;
  }
  
  .checklist-item.reference {
    background-color: #e8f5e9; /* light green */
    border-left: 4px solid #43a047;
  }
  
  .checklist-item.important {
    background-color: #fbe9e7; /* light red */
    border-left: 4px solid #e53935;
  }  
  </style>
</head>
<body>

  <div class="legend">
    <div class="legend-item"><span class="color-box prepare_pipeline"></span> Prepare Pipeline</div>
    <div class="legend-item"><span class="color-box setup"></span> Setup</div>
    <div class="legend-item"><span class="color-box move"></span> Move files</div>
    <div class="legend-item"><span class="color-box reference"></span> Reference</div>
    <div class="legend-item"><span class="color-box important"></span> Important</div>
  </div>
  
  <div class="checklist-container">

    <h1>InPreD pipeline Checklist</h1>
    <div class="subtitle">Run ID = --runID--</div>  
    <div class="checklist">

    --checklist_buttons--

<!--
      <div class="checklist-item">
        <input type="checkbox" id="item1">
        <label for="item1">Verify disk space availability</label>
      </div>
-->      
      
    </div>
  </div>

  <script>
    // Load saved state
    document.querySelectorAll('.checklist-item input[type="checkbox"]').forEach((checkbox) => {
      const id = checkbox.id;
      const saved = localStorage.getItem(id);
      if (saved === "true") {
        checkbox.checked = true;
        checkbox.parentElement.classList.add("checked");
      }

      checkbox.addEventListener('change', () => {
        localStorage.setItem(id, checkbox.checked);
        checkbox.parentElement.classList.toggle("checked", checkbox.checked);
      });
    });
  </script>

</body>
</html>
